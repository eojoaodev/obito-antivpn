# ------------------------------------------
#  PROVEDOR DE API
# ------------------------------------------
# API principal para detecГ§ГЈo de VPN/Proxy.
#
#   iphub      вҶ’ iphub.info       (recomendado)
#   proxycheck вҶ’ proxycheck.io    (alternativa)
#
api-provider: iphub

# Se a API principal falhar, tenta a outra automaticamente?
#   true  вҶ’ Sim, tenta o fallback (recomendado)
#   false вҶ’ NГЈo, aplica block-on-api-error
#
api-fallback: true

# Timeout de conexГЈo com a API (em segundos)
# Valores muito baixos podem causar falsos negativos
# em servidores com latГӘncia alta.
#
api-timeout-seconds: 5

# ------------------------------------------
#  IPHUB.INFO
# ------------------------------------------
# Sem chave:        1.000 verificaГ§Гөes/dia
# Com chave grГЎtis: limite maior
# Crie sua chave:   https://iphub.info/
#
iphub-key: ""

# NГӯvel de bloqueio do IPHub:
#
#   1 вҶ’ Bloqueia block=1 (VPN/Proxy confirmado)     вҶҗ recomendado
#   2 вҶ’ Bloqueia block=1 e block=2 (+ Datacenters)  вҶҗ mais agressivo
#
# O campo `block` do IPHub jГЎ considera ASN, roteamento
# e comportamento do IP вҖ” confiamos 100% nele.
#
iphub-block-level: 1

# ------------------------------------------
#  PROXYCHECK.IO
# ------------------------------------------
# Usado como API primГЎria (se api-provider: proxycheck)
# ou como fallback automГЎtico (se api-fallback: true).
#
# Crie sua chave: https://proxycheck.io/
#
proxycheck-key: ""

# ------------------------------------------
#  RESTRIГҮГғO POR PAГҚS
# ------------------------------------------
# Permite apenas IPs do Brasil?
#
#   true  вҶ’ Bloqueia qualquer IP fora do BR
#   false вҶ’ Permite qualquer paГӯs (sГі bloqueia VPN/Proxy)
#
# AtenГ§ГЈo: IPs com countryCode vazio (ex: resposta incompleta
# da API) nunca sГЈo bloqueados por paГӯs вҖ” apenas VPNs confirmadas.
#
brazil-only: false

# ------------------------------------------
#  MENSAGENS DE KICK
# ------------------------------------------
# Suporte a mГәltiplas linhas com |
# CГіdigos de cor: &c &a &e &7 &f &b &l &n &o
