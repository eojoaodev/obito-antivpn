# ------------------------------------------
#  CACHE
# ------------------------------------------
# O cache tem duas camadas:
#   L1 (memГіria RAM) вҖ” acesso instantГўneo, temporГЎrio
#   L2 (SQLite)      вҖ” persistente entre reinicios
#
# Tempo em HORAS para manter um IP em cache.
# ApГіs expirar, o IP Г© verificado novamente na API.
#
cache-duration-hours: 24

# Limite mГЎximo de entradas no cache em memГіria (L1).
# IPs acima desse limite sГі vГЈo pro SQLite (L2).
# Ajuste conforme a RAM disponГӯvel do servidor.
#
max-memory-cache-size: 5000

# Intervalo em MINUTOS para limpeza automГЎtica de entradas expiradas.
# A limpeza roda de forma assГӯncrona вҖ” zero lag.
#
cleanup-interval-minutes: 30

# ------------------------------------------
#  ERRO NA API
# ------------------------------------------
# O que fazer se TODAS as APIs falharem?
# (sГі relevante se api-fallback: false ou ambas falharem)
#
#   false вҶ’ Deixa entrar  (recomendado вҖ” evita falsos bloqueios)
#   true  вҶ’ Bloqueia por precauГ§ГЈo
#
block-on-api-error: false

# ------------------------------------------
#  NOTIFICAГҮГ•ES PARA ADMINS
# ------------------------------------------
# Envia mensagem no chat para admins com permissГЈo
# antivpn.notify quando alguГ©m for bloqueado.
#
notify-admins: true

# ------------------------------------------
#  LOG EM ARQUIVO
# ------------------------------------------
# Salva todos os bloqueios em plugins/AntiVPN/blocks.log
# e na tabela block_log do SQLite.
#
# O log usa uma fila interna вҖ” nГЈo impacta performance.
#
log-to-file: true